name: hera

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILES:-5}

x-migration-environment: &migration-environment
  APP_DEBUG: "true"
  ENVIRONMENT: ${ENVIRONMENT:-hackathon}
  APP_VERSION: ${APP_VERSION:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: json
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hera_owner}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-hera}

x-api-environment: &api-environment
  <<: *migration-environment
  APP_DEBUG: ${APP_DEBUG:-false}
  REFERENCE_DATE_MODE: ${REFERENCE_DATE_MODE:-dataset_start}
  TREAT_PROVIDED_DATA_AS_LATEST: ${TREAT_PROVIDED_DATA_AS_LATEST:-true}
  ALLOW_REVIEW_ONLY_DATA: ${ALLOW_REVIEW_ONLY_DATA:-false}
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:8080"]}
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
  RATE_LIMIT_STORAGE: redis
  REDIS_URL: redis://redis:6379/0
  CONVERSATION_MEMORY_BACKEND: redis
  STRUCTURED_CACHE_ENABLED: ${STRUCTURED_CACHE_ENABLED:-true}
  STRUCTURED_CACHE_TTL_SECONDS: ${STRUCTURED_CACHE_TTL_SECONDS:-300}
  STRUCTURED_CACHE_MAX_PAYLOAD_BYTES: ${STRUCTURED_CACHE_MAX_PAYLOAD_BYTES:-524288}
  TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
  TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-["127.0.0.1/32","::1/128","172.16.0.0/12"]}
  LLM_PROVIDER: openai
  API_KEY: ${API_KEY:?Set API_KEY in .env; never commit it}
  FPT_API_BASE_URL: ${FPT_API_BASE_URL:-https://mkp-api.fptcloud.com}
  FPT_LLM_MODEL: ${FPT_LLM_MODEL:-gpt-oss-120b}
  FPT_EMBEDDING_MODEL: ${FPT_EMBEDDING_MODEL:-Vietnamese_Embedding}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
  LLM_MAX_CONCURRENT_REQUESTS: ${LLM_MAX_CONCURRENT_REQUESTS:-2}
  LLM_QUEUE_TIMEOUT_SECONDS: ${LLM_QUEUE_TIMEOUT_SECONDS:-2}
  LLM_RESPONSE_CACHE_ENABLED: ${LLM_RESPONSE_CACHE_ENABLED:-true}
  LLM_RESPONSE_CACHE_TTL_SECONDS: ${LLM_RESPONSE_CACHE_TTL_SECONDS:-300}
  LLM_RESPONSE_CACHE_MAX_ENTRIES: ${LLM_RESPONSE_CACHE_MAX_ENTRIES:-512}
  EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-10}
  CHAT_OVERALL_TIMEOUT_SECONDS: ${CHAT_OVERALL_TIMEOUT_SECONDS:-35}
  MODEL_ROUTING_ENABLED: ${MODEL_ROUTING_ENABLED:-true}
  MODEL_ROUTING_TIMEOUT_SECONDS: ${MODEL_ROUTING_TIMEOUT_SECONDS:-6}
  MODEL_ROUTING_MAX_TOKENS: ${MODEL_ROUTING_MAX_TOKENS:-1024}
  MODEL_ROUTING_EMERGENCY_CONFIDENCE_THRESHOLD: ${MODEL_ROUTING_EMERGENCY_CONFIDENCE_THRESHOLD:-0.62}
  MODEL_ROUTING_INTENT_CONFIDENCE_THRESHOLD: ${MODEL_ROUTING_INTENT_CONFIDENCE_THRESHOLD:-0.60}
  MODEL_TIMEOUT_SECONDS: ${MODEL_TIMEOUT_SECONDS:-45}
  MODEL_PROBE_LLM_MAX_TOKENS: ${MODEL_PROBE_LLM_MAX_TOKENS:-8}
  EMBEDDING_PROVIDER: openai
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Vietnamese_Embedding}
  EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
  EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://mkp-api.fptcloud.com}
  VECTOR_STORE_PROVIDER: ${VECTOR_STORE_PROVIDER:-pgvector}
  RAG_TOP_K: ${RAG_TOP_K:-3}
  RAG_GENERATION_MAX_TOKENS: ${RAG_GENERATION_MAX_TOKENS:-512}
  HOSPITAL_NAME: ${HOSPITAL_NAME:-Hanoi Heart Hospital}
  HOSPITAL_PUBLIC_BASE_URL: ${HOSPITAL_PUBLIC_BASE_URL:-https://benhvientimhanoi.vn}
  HOSPITAL_HOTLINE: ${HOSPITAL_HOTLINE:-}
  EMERGENCY_HOTLINE: ${EMERGENCY_HOTLINE:-115}
  BOOKING_PROVIDER: ${BOOKING_PROVIDER:-local_prototype}
  DEFAULT_DOCTOR_CAPACITY_PER_SESSION: ${DEFAULT_DOCTOR_CAPACITY_PER_SESSION:-20}
  BOOKING_HOLD_TTL_SECONDS: ${BOOKING_HOLD_TTL_SECONDS:-300}
  BOOKING_REQUIRE_APPROVED_DOCTOR: ${BOOKING_REQUIRE_APPROVED_DOCTOR:-true}
  BOOKING_REQUIRE_APPROVED_CAPACITY_RULE: ${BOOKING_REQUIRE_APPROVED_CAPACITY_RULE:-false}
  BOOKING_ALLOW_PROJECT_MVP_RULE: ${BOOKING_ALLOW_PROJECT_MVP_RULE:-true}
  BOOKING_MAX_ACTIVE_HOLDS_PER_ANONYMOUS_SESSION: ${BOOKING_MAX_ACTIVE_HOLDS_PER_ANONYMOUS_SESSION:-2}
  HOLD_TOKEN_SECRET: ${HOLD_TOKEN_SECRET:?Set a random HOLD_TOKEN_SECRET in .env}
  BOOKING_PII_HASH_SECRET: ${BOOKING_PII_HASH_SECRET:?Set a random BOOKING_PII_HASH_SECRET in .env}
  CHAT_MAX_CHARS: ${CHAT_MAX_CHARS:-2000}
  EPHEMERAL_CONTEXT_TTL_MINUTES: ${EPHEMERAL_CONTEXT_TTL_MINUTES:-30}
  CONSENTED_MESSAGE_TTL_DAYS: ${CONSENTED_MESSAGE_TTL_DAYS:-7}
  LOG_RAW_MESSAGES: "false"
  PROMETHEUS_METRICS_ENABLED: ${PROMETHEUS_METRICS_ENABLED:-true}
  LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
  LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
  LANGFUSE_SAMPLE_RATE: ${LANGFUSE_SAMPLE_RATE:-0.2}
  LANGFUSE_CAPTURE_CONTENT: "false"

x-api-image: &api-image
  image: ${HERA_API_IMAGE_REPOSITORY:-hera-api}:${HERA_IMAGE_TAG:-local}
  build:
    context: ./apps/backend
    dockerfile: Dockerfile

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hera}
      POSTGRES_USER: ${POSTGRES_USER:-hera_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  migrate:
    <<: *api-image
    command: ["alembic", "upgrade", "head"]
    environment: *migration-environment
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  seed:
    <<: *api-image
    command:
      - python
      - /app/scripts/seed_postgres.py
      - --seed-archive
      - /app/data/hera_postgres_seed.json.gz
      - --expected-bundle-version
      - 2.0.0
    environment: *migration-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  data-export:
    <<: *api-image
    profiles: ["tools"]
    command:
      - python
      - /app/scripts/export_postgres_seed.py
      - --template
      - /app/data/hera_postgres_seed.json.gz
      - --output
      - /export/hera_postgres_seed.json.gz
      - --generated-dir
      - /source-generated
      - --confirm-overwrite
    environment: *migration-environment
    volumes:
      - ./apps/backend/data:/export
      - ./data/generated:/source-generated:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  backend:
    <<: *api-image
    environment: *api-environment
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json,urllib.request; d=json.load(urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=20)); raise SystemExit(0 if d.get('status') == 'ok' else 1)"
      interval: 30s
      timeout: 25s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend
      - egress

  frontend:
    image: ${HERA_WEB_IMAGE_REPOSITORY:-hera-web}:${HERA_IMAGE_TAG:-local}
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_EMBED_PARENT_ORIGINS: ${VITE_EMBED_PARENT_ORIGINS:-https://benhvientimhanoi.vn,https://www.benhvientimhanoi.vn}
        VITE_EMERGENCY_HOTLINE: ${EMERGENCY_HOTLINE:-115}
    ports:
      - "${HERA_BIND_ADDRESS:-127.0.0.1}:${HERA_HTTP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - edge
      - backend

volumes:
  postgres_data:

networks:
  edge:
  backend:
    internal: true
  egress:
