[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra --strict-markers"
pythonpath = [
  "apps/backend",
  "scripts",
]
testpaths = [
  "apps/backend/tests",
]
markers = [
  "unit: fast tests that isolate a function, class, or small service with fakes/mocks",
  "integration: tests that exercise FastAPI or infrastructure boundaries",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008", "E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true

