name: HERA Deploy Verified Release

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub Environment for approvals/secrets; this does not change app ENVIRONMENT
        required: true
        type: choice
        options:
          - staging
          - hackathon-live

permissions:
  contents: read
  actions: read
  packages: read

concurrency:
  group: hera-deploy-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Require a successful main CI run for this exact commit
        uses: actions/github-script@v7
        with:
          script: |
            if (context.ref !== 'refs/heads/main') {
              core.setFailed(`Deploy only accepts refs/heads/main, received ${context.ref}`);
              return;
            }
            const {owner, repo} = context.repo;
            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'ci.yml',
              head_sha: context.sha,
              status: 'completed',
              per_page: 20,
            });
            const run = response.data.workflow_runs.find(candidate =>
              candidate.event === 'push' &&
              candidate.head_branch === 'main' &&
              candidate.conclusion === 'success'
            );
            if (!run) {
              core.setFailed(`No successful main-branch CI run published images for ${context.sha}`);
              return;
            }
            core.info(`Using tested artifacts from ${run.html_url}`);

  prepare:
    runs-on: ubuntu-latest
    needs: verify-ci
    outputs:
      registry_base: ${{ steps.names.outputs.registry_base }}
      image_tag: ${{ steps.names.outputs.image_tag }}
    steps:
      - id: names
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "registry_base=ghcr.io/${repository}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Configure pinned SSH host identity
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        shell: bash
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
      - name: Pull the CI-published images, verify dependencies and smoke test
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
          API_REPOSITORY: ${{ needs.prepare.outputs.registry_base }}/hera-api
          WEB_REPOSITORY: ${{ needs.prepare.outputs.registry_base }}/hera-web
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
        shell: bash
        run: |
          test -n "$DEPLOY_HOST" && test -n "$DEPLOY_USER" && test -n "$DEPLOY_PATH"
          port="${DEPLOY_PORT:-22}"
          printf -v q_path '%q' "$DEPLOY_PATH"
          printf -v q_user '%q' "$GHCR_USER"
          printf -v q_api '%q' "$API_REPOSITORY"
          printf -v q_web '%q' "$WEB_REPOSITORY"
          printf -v q_tag '%q' "$IMAGE_TAG"
          remote_command="cd $q_path && bash scripts/remote-deploy.sh \
            --ghcr-user $q_user \
            --api-repository $q_api \
            --web-repository $q_web \
            --image-tag $q_tag"
          printf '%s' "$GHCR_TOKEN" | ssh \
            -i "$HOME/.ssh/id_ed25519" -p "$port" \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" "$remote_command"
      - name: Remove temporary SSH material
        if: always()
        shell: bash
        run: rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
