name: HERA CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hera-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  data-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rebuild deterministic generated data
        run: |
          rm -rf data/generated
          node scripts/build-generated-data.mjs
      - name: Generated files must match Git exactly
        run: git diff --exit-code -- data/generated
      - name: Validate raw inputs, generated exact-set and PostgreSQL seed
        run: >-
          python apps/backend/scripts/verify_release_assets.py
          --seed-archive apps/backend/data/hera_postgres_seed.json.gz
          --generated-dir data/generated
          --require-generated
          --expected-bundle-version 2.0.0

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: hera
          POSTGRES_USER: hera_owner
          POSTGRES_PASSWORD: ci_postgres_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hera_owner -d hera"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_DEBUG: "true"
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://hera_owner:ci_postgres_only@127.0.0.1:5432/hera
      HERA_TEST_DATABASE_URL: postgresql+psycopg://hera_owner:ci_postgres_only@127.0.0.1:5432/hera
      LOG_RAW_MESSAGES: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/backend/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/backend/requirements.txt -r requirements-dev.txt
      - name: Static checks
        run: |
          python -m compileall -q apps/backend/app apps/backend/scripts
          python -m ruff check apps/backend/app apps/backend/tests apps/backend/scripts scripts
      - name: Verify checksum-pinned PostgreSQL seed archive
        run: >-
          python apps/backend/scripts/verify_release_assets.py
          --seed-archive apps/backend/data/hera_postgres_seed.json.gz
          --generated-dir data/generated
          --require-generated
          --expected-bundle-version 2.0.0
      - name: Empty database migration
        working-directory: apps/backend
        run: alembic upgrade head
      - name: PostgreSQL reference-data seed (first pass)
        working-directory: apps/backend
        run: >-
          python scripts/seed_postgres.py
          --seed-archive data/hera_postgres_seed.json.gz
          --expected-bundle-version 2.0.0
      - name: PostgreSQL reference-data seed is idempotent (second pass)
        working-directory: apps/backend
        run: >-
          python scripts/seed_postgres.py
          --seed-archive data/hera_postgres_seed.json.gz
          --expected-bundle-version 2.0.0
      - name: PostgreSQL canonical export is deterministic and source-bound
        run: |
          python apps/backend/scripts/export_postgres_seed.py --generated-dir data/generated --output /tmp/hera-seed-a.json.gz
          python apps/backend/scripts/export_postgres_seed.py --generated-dir data/generated --output /tmp/hera-seed-b.json.gz
          cmp /tmp/hera-seed-a.json.gz /tmp/hera-seed-b.json.gz
          python apps/backend/scripts/verify_release_assets.py --seed-archive /tmp/hera-seed-a.json.gz --generated-dir data/generated --require-generated --expected-bundle-version 2.0.0
      - name: Backend tests against migrated and seeded PostgreSQL
        run: python -m pytest
      - name: Python dependency audit
        run: |
          python -m pip install pip-audit
          python -m pip_audit --requirement apps/backend/requirements.txt --progress-spinner off

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  containers:
    runs-on: ubuntu-latest
    needs: [data-integrity, backend, frontend, secret-scan]
    permissions:
      contents: read
      packages: write
    env:
      POSTGRES_PASSWORD: ci_postgres_only
      HOLD_TOKEN_SECRET: ci_hold_only_0123456789abcdef0123456789abcdef
      BOOKING_PII_HASH_SECRET: ci_pii_only_0123456789abcdef0123456789abcdef
      API_KEY: ci-placeholder-not-a-real-key
      GRAFANA_ADMIN_PASSWORD: ci_grafana_only_0123456789abcdef
      HERA_IMAGE_TAG: ci
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose without printing expanded secrets
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.monitoring.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.stress.yml config --quiet
      - name: Build deploy images
        run: docker compose build backend frontend
      - name: Small PostgreSQL stress gate (zero model API calls)
        env:
          STRESS_BUILD: "0"
        run: make stress-ci
      - name: Upload bounded stress evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-report-${{ github.sha }}
          path: artifacts/stress/latest.json
          if-no-files-found: warn
          retention-days: 7
      - name: Scan API image for critical vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: hera-api:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan web image for critical vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: hera-web:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Log in to GHCR for a main-branch release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish the exact images that passed both scans
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          registry_base="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker tag hera-api:ci "$registry_base/hera-api:$GITHUB_SHA"
          docker tag hera-web:ci "$registry_base/hera-web:$GITHUB_SHA"
          docker push "$registry_base/hera-api:$GITHUB_SHA"
          docker push "$registry_base/hera-web:$GITHUB_SHA"
