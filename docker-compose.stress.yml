name: hera

# Local/CI-only overlay. Never attach this listener to a public interface.
services:
  backend:
    environment:
      RATE_LIMIT_ENABLED: "false"
      LANGFUSE_ENABLED: "false"

  frontend:
    ports: !override
      - "127.0.0.1:${STRESS_HTTP_PORT:-18080}:80"
    volumes:
      - ./infra/nginx/frontend-stress.conf:/etc/nginx/conf.d/default.conf:ro

