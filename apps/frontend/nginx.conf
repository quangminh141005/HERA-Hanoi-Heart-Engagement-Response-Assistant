limit_req_zone $binary_remote_addr zone=hera_api:10m rate=120r/m;

# Docker DNS is refreshed so new backend replicas can join without restarting
# the web container. The shared upstream zone keeps load balancing state.
resolver 127.0.0.11 valid=10s ipv6=off;
upstream hera_backend {
    zone hera_backend 64k;
    server backend:8000 resolve;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 64k;
    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/javascript application/json image/svg+xml text/css text/plain;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-src 'none'; frame-ancestors 'self' https://benhvientimhanoi.vn https://www.benhvientimhanoi.vn; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"error":{"code":"RATE_LIMITED","message_vi":"Bạn gửi yêu cầu quá nhanh. Vui lòng thử lại sau.","request_id":"$request_id","retryable":true}}';
    }

    location = /healthz {
        proxy_pass http://hera_backend/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 2s;
        proxy_read_timeout 3s;
    }

    location = /readyz {
        proxy_pass http://hera_backend/readyz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # Metrics remain internal to the backend network.
    location = /metrics {
        return 404;
    }

    location /api/ {
        limit_req zone=hera_api burst=30 nodelay;
        proxy_pass http://hera_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 40s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
