global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: hera-api
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - backend
        type: A
        port: 8000
        refresh_interval: 15s
    relabel_configs:
      - target_label: service
        replacement: hera-api
