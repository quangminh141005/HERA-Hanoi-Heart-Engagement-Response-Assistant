# Host-level TLS terminator example. Replace domain and certificate paths.
upstream hera_frontend {
    server 127.0.0.1:8080;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types text/css application/javascript application/manifest+json image/svg+xml;

server {
    listen 80;
    server_name hera.example.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hera.example.vn;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 64k;

    # Vite emits content-hashed asset names. Cache them in the browser; never
    # apply this policy to index.html or API responses.
    location ~* \.(?:css|js|ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        proxy_pass http://hera_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Expires;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location / {
        proxy_pass http://hera_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 40s;
    }
}
